name: Deploy Jivo Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Windows Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          command_timeout: 30m
          script: |
            cmd.exe /D /S /C "cd /d C:\LiveProjects\NEXT_JS_WEB_JIVO.IN && git fetch origin main && git show origin/main:scripts/deploy-jivo-windows.ps1 > %TEMP%\jivo-deploy-windows.ps1 && powershell.exe -NoProfile -ExecutionPolicy Bypass -File %TEMP%\jivo-deploy-windows.ps1"
