name: Deploy Jivo Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Windows Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}

          script: |
            powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference = 'Stop'; Set-Location 'C:\LiveProjects\NEXT_JS_WEB_JIVO.IN'; Write-Host 'Pulling latest code...'; git checkout main; git pull --ff-only origin main; Write-Host 'Installing dependencies...'; npm.cmd install; Write-Host 'Syncing database schema...'; npm.cmd run db:push; Write-Host 'Seeding missing CMS defaults...'; npm.cmd run db:seed; Write-Host 'Building application...'; npm.cmd run build; Write-Host 'Restarting service...'; Restart-Service -Name 'jivo-web' -Force; Write-Host 'Deployment completed.'"
